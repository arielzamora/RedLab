<div class="layout-container">
  <!-- Columna Izquierda: Perfil -->
  <aside class="sidebar-left">
    <div class="profile-shortcut">
      <div class="avatar-placeholder"></div>
      <span class="user-name">Mi Perfil</span>
    </div>
  </aside>

  <!-- Columna Central: Feed -->
  <main class="feed-main">
    <!-- Crear Post -->
    <div class="card create-post">
      <div class="create-post-header">
        <div class="avatar-placeholder"></div>
        <input type="text" placeholder="¿Qué estás pensando?" class="post-input" />
      </div>
      <div class="create-post-actions">
        <button class="btn-primary">Publicar</button>
      </div>
    </div>

    <!-- Lista de Publicaciones -->
    <div class="posts-list">
      <app-post-card></app-post-card>
      <app-post-card></app-post-card>
      <app-post-card></app-post-card>
    </div>
  </main>

  <!-- Columna Derecha: Panel Lateral -->
  <aside class="sidebar-right">
    <div class="card">
      <h3>Estadísticas</h3>
      <p class="text-muted">Próximamente en el Sprint 4...</p>
    </div>
  </aside>
</div>
