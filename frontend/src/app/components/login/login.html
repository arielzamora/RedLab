<div class="login-wrapper">
  <div class="login-container">
    <!-- Left Column: Branding -->
    <div class="brand-column">
      <h1 class="brand-logo">utnLab</h1>
      <p class="brand-description">
        Conéctate con tus compañeros, profesores y el mundo entero en utnLab. Una red social limpia, rápida y segura.
      </p>
    </div>

    <!-- Right Column: Login Card -->
    <div class="card-column">
      <div class="card login-card">
        <form (ngSubmit)="onSubmit()" class="login-form">
          <div class="form-group">
            <input 
              type="text" 
              name="username" 
              placeholder="Correo electrónico o nombre de usuario" 
              class="form-input" 
              [(ngModel)]="username" 
              required
            />
          </div>
          <div class="form-group">
            <input 
              type="password" 
              name="password" 
              placeholder="Contraseña" 
              class="form-input" 
              [(ngModel)]="password" 
              required
            />
          </div>

          <button type="submit" class="btn-primary login-btn" [disabled]="isLoading">
            @if (isLoading) {
              <span class="spinner"></span> Iniciando sesión...
            } @else {
              Iniciar sesión
            }
          </button>
          
          <div class="forgot-password">
            <a href="javascript:void(0)">¿Olvidaste tu contraseña?</a>
          </div>

          <div class="divider"></div>

          <div class="create-account-container">
            <button type="button" class="btn-secondary" (click)="goToRegister()">
              Crear cuenta nueva
            </button>
          </div>
        </form>
      </div>
    </div>
  </div>
</div>

<!-- Custom Modal for Alerts -->
@if (showModal) {
  <div class="modal-backdrop" (click)="closeModal()">
    <div class="modal-content" (click)="$event.stopPropagation()">
      <div class="modal-header">
        <span>{{ modalTitle }}</span>
        <button type="button" class="btn-close" (click)="closeModal()">&times;</button>
      </div>
      <div class="modal-body">
        <p>{{ modalMessage }}</p>
      </div>
      <div class="modal-footer">
        <button type="button" class="btn-primary" (click)="closeModal()">Entendido</button>
      </div>
    </div>
  </div>
}
