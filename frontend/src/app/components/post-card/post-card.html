<div class="card post-card" *ngIf="post">
  <!-- Cabecera -->
  <div class="post-header">
    <div class="author-info-wrapper">
      <img [src]="authorAvatar | avatarFallback:post.autor?.nombre" class="avatar-image" alt="Avatar" />
      
      <div class="post-meta">
        <span class="user-name">{{ authorName }}</span>
        <span class="user-role-badge" [class.admin-badge]="post.autor?.perfil === 'administrador'">
          {{ post.autor?.perfil === 'administrador' ? 'Admin' : 'Usuario' }}
        </span>
        <span class="post-date">{{ post.createdAt | timeAgo }}</span>
      </div>
    </div>

    <!-- Acciones de cabecera: Botón de Borrar -->
    <button *ngIf="canDelete" class="btn-delete" (click)="onDelete()" title="Eliminar publicación">
      &times;
    </button>
  </div>

  <!-- Cuerpo -->
  <div class="post-body">
    <h3 class="post-title" *ngIf="post.titulo" style="font-size: 1.15rem; font-weight: 700; margin-bottom: 6px; color: var(--fb-text-primary); cursor: pointer;" (click)="goToDetail()">{{ post.titulo }}</h3>
    <p class="post-text">{{ post.descripcion || post.texto }}</p>
    <img *ngIf="post.imgUrl" [src]="post.imgUrl" appImgFallback class="post-image" alt="Imagen de publicación" style="cursor: pointer;" (click)="goToDetail()" />
  </div>

  <!-- Stats row (Facebook-style) -->
  <div class="post-stats-row">
    <!-- Left: Likes count with small Facebook reactions -->
    <div style="display: flex; align-items: center; gap: 6px; cursor: pointer;" (click)="toggleLike()">
      <div class="reaction-icons">
        <span class="reaction-icon-blue">
          <svg viewBox="0 0 24 24" width="9" height="9" fill="currentColor">
            <path d="M5 22h14c1.1 0 2-.9 2-2v-9c0-1.1-.9-2-2-2h-3.69l.54-2.61.03-.3c0-.38-.15-.74-.4-1.01L14.47 4 9.12 9.35C8.82 9.65 8.64 10.06 8.64 10.5V20c0 1.1.9 2 2 2zM3 10H1v12h2V10z"/>
          </svg>
        </span>
        <span class="reaction-icon-red">
          <svg viewBox="0 0 24 24" width="9" height="9" fill="currentColor">
            <path d="M12 21.35l-1.45-1.32C5.4 15.36 2 12.28 2 8.5 2 5.42 4.42 3 7.5 3c1.74 0 3.41.81 4.5 2.09C13.09 3.81 14.76 3 16.5 3 19.58 3 22 5.42 22 8.5c0 3.78-3.4 6.86-8.55 11.54L12 21.35z"/>
          </svg>
        </span>
      </div>
      <span style="font-weight: 500;">{{ post.likes?.length || 0 }}</span>
    </div>
    
    <!-- Right: Comments count -->
    <div style="cursor: pointer; font-weight: 500;" (click)="goToDetail()">
      <span>{{ post.comentarios?.length || 0 }} comentarios</span>
    </div>
  </div>

  <!-- Divider -->
  <div class="divider" style="height: 1px; background-color: var(--fb-divider); margin: 0 16px;"></div>

  <!-- Action buttons row -->
  <div class="post-action-buttons-row">
    <!-- Like Button -->
    <button 
      (click)="toggleLike()" 
      class="btn-post-action"
      [class.active]="isLiked"
    >
      <svg viewBox="0 0 24 24" width="20" height="20" fill="currentColor">
        <path *ngIf="!isLiked" d="M16.5 8H19c1.1 0 2 .9 2 2v9c0 1.1-.9 2-2 2H9.43c-.81 0-1.52-.49-1.8-1.25L5.08 13.2A1.996 1.996 0 0 1 5 12.3V10c0-1.1.9-2 2-2h5.69l-.88-4.24c-.1-.47.04-.96.38-1.3.38-.38.92-.5 1.42-.32.5.18.89.57 1.07 1.07L16.5 8M7 10v9h2v-9H7m12 0h-6.83l1.09-5.22c.04-.19.01-.39-.09-.54s-.26-.24-.45-.24c-.19 0-.37.09-.45.24L10.12 10H19v9h-8.28l-2-5.4V10h9.28z"/>
        <path *ngIf="isLiked" d="M5 22h14c1.1 0 2-.9 2-2v-9c0-1.1-.9-2-2-2h-3.69l.54-2.61.03-.3c0-.38-.15-.74-.4-1.01L14.47 4 9.12 9.35C8.82 9.65 8.64 10.06 8.64 10.5V20c0 1.1.9 2 2 2zM3 10H1v12h2V10z"/>
      </svg>
      <span>Me gusta</span>
    </button>

    <!-- Comment Button -->
    <button 
      (click)="goToDetail()" 
      class="btn-post-action"
    >
      <svg viewBox="0 0 24 24" width="20" height="20" fill="currentColor">
        <path d="M9 10.5h6a1 1 0 0 1 0 2H9a1 1 0 0 1 0-2zm0 3h6a1 1 0 0 1 0 2H9a1 1 0 0 1 0-2zm12-9v12a3 3 0 0 1-3 3H7.83l-4.3 4.3c-.94.94-2.53.27-2.53-1.06V4.5A3 3 0 0 1 4 1.5h14a3 3 0 0 1 3 3zm-2 0a1 1 0 0 0-1-1H4a1 1 0 0 0-1 1v12.59l2.29-2.29A1 1 0 0 1 6 15.5h12a1 1 0 0 0 1-1V4.5z"/>
      </svg>
      <span>Comentar</span>
    </button>
  </div>
</div>
