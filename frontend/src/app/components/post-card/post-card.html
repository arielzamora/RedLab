<div class="card post-card" *ngIf="post">
  <!-- Cabecera -->
  <div class="post-header">
    <div class="author-info-wrapper">
      <img *ngIf="authorAvatar" [src]="authorAvatar" class="avatar-image" alt="Avatar" />
      <div *ngIf="!authorAvatar" class="avatar-placeholder"></div>
      
      <div class="post-meta">
        <span class="user-name">{{ authorName }}</span>
        <span class="user-role-badge" [class.admin-badge]="post.autor?.perfil === 'administrador'">
          {{ post.autor?.perfil === 'administrador' ? 'Admin' : 'Usuario' }}
        </span>
        <span class="post-date">{{ post.createdAt | date:'short' }}</span>
      </div>
    </div>

    <!-- Acciones de cabecera: Botón de Borrar -->
    <button *ngIf="canDelete" class="btn-delete" (click)="onDelete()" title="Eliminar publicación">
      &times;
    </button>
  </div>

  <!-- Cuerpo -->
  <div class="post-body">
    <p class="post-text">{{ post.texto }}</p>
  </div>

  <!-- Interacción -->
  <div class="post-actions">
    <button class="btn-text" (click)="toggleLike()" [class.active]="isLiked">
      <i class="icon-like"></i> Me gusta ({{ post.likes?.length || 0 }})
    </button>
  </div>
</div>
